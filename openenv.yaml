spec_version: 1
name: mario_the_plumber
type: space
runtime: fastapi
app: server.app:app
port: 8000
tasks:
  - id: 1
    task_id: 1
    name: Ingestion Contract Repair
    difficulty: easy
    description: Stabilize a customer-ingestion batch after missing values and light contract drift.
    max_steps: 10
    success_threshold: 0.85
    grader: true
    grade_endpoint: /grade/1
    graders:
      - type: http
        url: /grade/1
        method: GET
    episode_grader:
      type: http
      url: /grader
      method: POST
      content_type: application/json
      payload_schema:
        task_id: 1
        episode_id: "<episode_id>"
  - id: 2
    task_id: 2
    name: Validation and Event Stabilization
    difficulty: medium
    description: Recover an event table after retries, duplicates, and validation regressions.
    max_steps: 15
    success_threshold: 0.8
    grader: true
    grade_endpoint: /grade/2
    graders:
      - type: http
        url: /grade/2
        method: GET
    episode_grader:
      type: http
      url: /grader
      method: POST
      content_type: application/json
      payload_schema:
        task_id: 2
        episode_id: "<episode_id>"
  - id: 3
    task_id: 3
    name: Referential Repair and Cascading Recovery
    difficulty: hard
    description: Restore customer, product, and order tables after cross-table dependency breakage.
    max_steps: 25
    success_threshold: 0.75
    grader: true
    grade_endpoint: /grade/3
    graders:
      - type: http
        url: /grade/3
        method: GET
    episode_grader:
      type: http
      url: /grader
      method: POST
      content_type: application/json
      payload_schema:
        task_id: 3
        episode_id: "<episode_id>"
  - id: 4
    task_id: 4
    name: Incremental ETL Incident Recovery
    difficulty: hard
    description: Recover a broken incremental ETL pipeline under backlog, freshness, and resource pressure.
    max_steps: 30
    success_threshold: 0.78
    grader: true
    grade_endpoint: /grade/4
    graders:
      - type: http
        url: /grade/4
        method: GET
    episode_grader:
      type: http
      url: /grader
      method: POST
      content_type: application/json
      payload_schema:
        task_id: 4
        episode_id: "<episode_id>"
  - id: 5
    task_id: 5
    name: Temporal Rollup Recovery
    difficulty: hard
    description: Restore a temporal ETL pipeline after schema evolution, late corrections, and stale rollups.
    max_steps: 35
    success_threshold: 0.82
    grader: true
    grade_endpoint: /grade/5
    graders:
      - type: http
        url: /grade/5
        method: GET
    episode_grader:
      type: http
      url: /grader
      method: POST
      content_type: application/json
      payload_schema:
        task_id: 5
        episode_id: "<episode_id>"
